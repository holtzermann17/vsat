services:
  vsat-web:
    build: .
    env_file:
      - .env
    environment:
      # use the compose service hostname so this works on Linux hosts too
      - DATABASE_URL=postgres://postgres:postgres@db:5432/vsat
    ports:
      - 3000:3000
    depends_on:
      - db
    container_name: VSAT
    labels:
      - dev.dozzle.group=vsat

  db:
    # https://hub.docker.com/_/postgres/
    image: postgres:17-bookworm
    restart: unless-stopped
    volumes:
      - postgres-vsat:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vsat
    ports:
      - 5432:5432
    container_name: DB
    labels:
      - dev.dozzle.group=vsat

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8080:8080
    container_name: Dozzle

volumes:
  postgres-vsat:
